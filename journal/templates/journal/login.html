{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Trading Journal</title>
<link rel="stylesheet" href="{% static 'journal/css/style.css' %}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">// Mayhem's Journal</div>
    <div class="login-sub">1000 setups. No strategy hopping.</div>
    <form method="post">
      {% csrf_token %}
      <div class="field" style="margin-bottom:12px"><label>Username</label><input type="text" name="username" autofocus autocomplete="username"></div>
      <div class="field" style="margin-bottom:18px"><label>Password</label><input type="password" name="password" autocomplete="current-password"></div>
      {% if form.errors %}<p style="color:var(--red);font-size:12px;margin-bottom:12px">Invalid username or password.</p>{% endif %}
      <button type="submit" class="btn-primary full">Sign in</button>
    </form>
  </div>
</div>
<script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</body>
</html>
